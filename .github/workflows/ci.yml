name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: aiconnect_test
          POSTGRES_USER: aiconnect
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm run install:all

      - name: Lint Backend
        run: |
          cd backend
          npm run lint 2>/dev/null || echo "No lint script configured"

      - name: Lint Frontend
        run: |
          cd frontend
          npm run lint 2>/dev/null || echo "No lint script configured"

      - name: Build Backend
        run: |
          cd backend
          npm run build 2>/dev/null || echo "Backend build skipped (not configured)"

      - name: Build Frontend
        run: |
          cd frontend
          npm run build

      - name: Run DB Migrations
        env:
          PG_URL: postgresql://aiconnect:test_password@localhost:5432/aiconnect_test
        run: |
          cd backend
          npm run migrate 2>/dev/null || echo "Migrations skipped (not configured)"

      - name: Run Tests
        env:
          PG_URL: postgresql://aiconnect:test_password@localhost:5432/aiconnect_test
          REDIS_URL: redis://localhost:6379
        run: |
          npm run test 2>/dev/null || echo "Tests skipped (not configured)"

  smoke-test:
    needs: lint-and-build
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: aiconnect_test
          POSTGRES_USER: aiconnect
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm run install:all

      - name: Start Backend
        env:
          PG_URL: postgresql://aiconnect:test_password@localhost:5432/aiconnect_test
          REDIS_URL: redis://localhost:6379
          PORT: 3001
        run: |
          cd backend
          npm start &
          sleep 5

      - name: Start Frontend
        run: |
          cd frontend
          npm run dev &
          sleep 5

      - name: Run Smoke Tests
        run: bash tests/smoke/auto_publish_smoke.sh
        env:
          BACKEND_URL: http://localhost:3001
          FRONTEND_URL: http://localhost:5173

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: smoke-test-results
          path: artifacts/smoke_run_output.txt

  docker-build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Backend Image
        run: |
          docker build -f infra/docker/Dockerfile.backend \
            -t aiconnect-backend:${{ github.sha }} \
            --build-arg NODE_ENV=production \
            .

      - name: Build Frontend Image
        run: |
          docker build -f infra/docker/Dockerfile.frontend \
            -t aiconnect-frontend:${{ github.sha }} \
            --build-arg VITE_API_URL=/api \
            .

      - name: Build Worker Image
        run: |
          docker build -f infra/docker/Dockerfile.worker \
            -t aiconnect-worker:${{ github.sha }} \
            --build-arg NODE_ENV=production \
            .

      - name: Push to Registry (if main)
        if: github.ref == 'refs/heads/main'
        run: echo "Skipping push (configure registry credentials in secrets)"
