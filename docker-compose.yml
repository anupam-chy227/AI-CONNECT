version: '3.8'

services:
  # PostgreSQL (development defaults)
  postgres:
    image: postgres:15-alpine
    container_name: aiconnect_postgres
    environment:
      POSTGRES_USER: aiconnect
      POSTGRES_PASSWORD: devpass123
      POSTGRES_DB: aiconnect_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiconnect"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (for caching and job queue)
  redis:
    image: redis:7-alpine
    container_name: aiconnect_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO (local S3-compatible object storage)
  minio:
    image: minio/minio:latest
    container_name: aiconnect_minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/minio_data
    command: server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API Server
  backend:
    build: ./backend
    container_name: aiconnect_backend
    ports:
      - "3001:3001"
    environment:
      - PG_URL=postgresql://aiconnect:devpass123@postgres:5432/aiconnect_dev
      - REDIS_URL=redis://redis:6379
      - S3_BUCKET=aiconnect-uploads
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - JWT_SECRET=${JWT_SECRET:-dev-secret-key}
      - INTERNAL_TOKEN=${INTERNAL_TOKEN:-internal-dev-token}
      - WS_SECRET=${WS_SECRET:-ws-dev-secret}
      - NODE_ENV=development
    volumes:
      - ./backend/src:/app/src
      - ./backend/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  # Frontend Application
  frontend:
    build: ./frontend
    container_name: aiconnect_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3001/api
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend

  # Worker Service (GPU-based media generation)
  worker:
    build: ./workers
    container_name: aiconnect_worker
    environment:
      - PG_URL=postgresql://aiconnect:devpass123@postgres:5432/aiconnect_dev
      - REDIS_URL=redis://redis:6379
      - S3_BUCKET=aiconnect-uploads
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - INTERNAL_TOKEN=${INTERNAL_TOKEN:-internal-dev-token}
      - BACKEND_URL=http://backend:3001
      - NODE_ENV=development
    volumes:
      - ./workers/src:/app/src
      - ./workers/jobs:/app/jobs
      - ./workers/done:/app/done
      - ./workers/output:/app/output
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  minio_data:
