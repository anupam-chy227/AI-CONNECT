version: '3.8'

services:
  # PostgreSQL (production)
  postgres:
    image: postgres:15-alpine
    container_name: aiconnect_postgres_prod
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (production)
  redis:
    image: redis:7-alpine
    container_name: aiconnect_redis_prod
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_prod_data:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: aiconnect/backend:latest
    container_name: aiconnect_backend_prod
    restart: always
    environment:
      - NODE_ENV=production
      - PG_URL=${PG_URL}
      - REDIS_URL=${REDIS_URL}
      - S3_BUCKET=${S3_BUCKET}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - INTERNAL_TOKEN=${INTERNAL_TOKEN}
      - WS_SECRET=${WS_SECRET}
    ports:
      - "3001:3001"
    volumes:
      - backend_uploads:/app/uploads
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aiconnect_net

  # Frontend Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: aiconnect/frontend:latest
    container_name: aiconnect_frontend_prod
    restart: always
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=https://api.aiconnect.io
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    networks:
      - aiconnect_net

  # Worker Service (GPU-based media generation)
  worker:
    build:
      context: ./workers
      dockerfile: Dockerfile
    image: aiconnect/worker:latest
    container_name: aiconnect_worker_prod
    restart: always
    environment:
      - NODE_ENV=production
      - PG_URL=${PG_URL}
      - REDIS_URL=${REDIS_URL}
      - S3_BUCKET=${S3_BUCKET}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - INTERNAL_TOKEN=${INTERNAL_TOKEN}
      - BACKEND_URL=${BACKEND_URL}
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aiconnect_net

volumes:
  postgres_prod_data:
  redis_prod_data:
  backend_uploads:

networks:
  aiconnect_net:
    driver: bridge
